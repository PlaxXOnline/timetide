name: timetide
description: >
  A comprehensive Flutter scheduling calendar package with 11 views,
  multi-resource scheduling, drag & drop, RRULE recurrence, and iCalendar
  export/import. Widget-layer only — no Material or Cupertino dependency.
version: 0.1.0
repository: https://github.com/janikkahle/timetide
issue_tracker: https://github.com/janikkahle/timetide/issues

topics:
  - calendar
  - scheduling
  - flutter-widget
  - drag-and-drop
  - rrule

environment:
  sdk: ^3.11.1
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
